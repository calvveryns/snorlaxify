<div class="process-detail-container" *ngIf="process()">
  <div class="breadcrumbs">
    <a routerLink="/processes" class="breadcrumb-link">Процессы</a>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-current">{{ process()?.task_id }}</span>
  </div>

  <div class="content-wrapper">
    <div class="left-panel">
      <div class="section">
        <h3 class="section-title">Общий прогресс:</h3>
        <p-progressBar [value]="(process()?.current_step || 0) / (process()?.total_steps || 1) * 100" [showValue]="true"></p-progressBar>
      </div>

      <div class="section">
        <h3 class="section-title">Шаги процесса:</h3>
        <div class="steps-list">
          <div
            *ngFor="let step of steps()"
            class="step-item"
            [class.completed]="step.status === 'completed'"
            [class.in-progress]="step.status === 'in_progress'"
            [class.waiting]="step.status === 'waiting'"
          >
            <div class="step-header">
              <span class="step-number">Шаг {{ step.id }}:</span>
              <span class="step-name">{{ step.name }}</span>
            </div>
            <div class="step-status">
              <span *ngIf="step.status === 'completed'" class="status-text completed">
                <i class="pi pi-check"></i>
                Завершено
              </span>
              <span *ngIf="step.status === 'in_progress'" class="status-text in-progress">
                <i class="pi pi-spin pi-spinner"></i>
                В процессе
              </span>
              <span *ngIf="step.status === 'waiting'" class="status-text waiting">
                <i class="pi pi-circle"></i>
                Ожидание
              </span>
              <span *ngIf="step.status === 'failed'" class="status-text failed">
                <i class="pi pi-times"></i>
                Ошибка
              </span>
              <!-- <span *ngIf="step.progress" class="step-progress">
                {{ step.progress.current }}/{{ step.progress.total }}
              </span> -->
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <p-card class="statistics-card">
          <ng-template pTemplate="header">
            <div class="card-header">Статистика прогресса:</div>
          </ng-template>
          <div class="statistics-content">
            <div class="stat-item">
              Обработано записей:
              <strong>
                <!-- {{ process()!.statistics.recordsProcessed.current }} из
                {{ process()!.statistics.recordsProcessed.total }} ({{ process()!.statistics.recordsProcessed.percentage }}%) -->
              </strong>
            </div>
            <div class="stat-item">
              <!-- Найдено кандидатов: <strong>{{ process()!.statistics.candidatesFound }} пар</strong> -->
            </div>
            <div class="stat-item">
              <!-- Проверено в LLM: <strong>{{ process()!.statistics.checkedInLLM }} пар</strong> -->
            </div>
            <div class="stat-item">
              <!-- Скорость: <strong>{{ process()!.statistics.speed }} записей/сек</strong> -->
            </div>
          </div>
        </p-card>
      </div>

      <div class="section actions">
        <p-button label="Приостановить" icon="pi pi-pause" (onClick)="onPause()" [outlined]="true"></p-button>
        <p-button
          label="Перезапустить шаг"
          icon="pi pi-refresh"
          (onClick)="onRestartStep()"
          [outlined]="true"
        ></p-button>
      </div>

      <div class="section results-section" *ngIf="true || isAllStepsCompleted()">
        <p-button
          label="Посмотреть результаты"
          icon="pi pi-eye"
          (onClick)="onViewResults()"
          styleClass="p-button-success"
        ></p-button>
      </div>
    </div>

    <div class="right-panel">
      <p-card class="log-card">
        <ng-template pTemplate="header">
          <div class="card-header">Лог выполнения:</div>
        </ng-template>
        <div class="log-content">
          <!-- <div *ngFor="let log of process()!.logs" class="log-entry">
            <span class="log-time">{{ log.time }}</span>
            <span class="log-message">{{ log.message }}</span>
          </div> -->
        </div>
      </p-card>
    </div>
  </div>
</div>
