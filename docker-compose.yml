services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: snorlaxify-postgres
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./openpim.sql:/docker-entrypoint-initdb.d/openpim.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d openpim" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: snorlaxify-server
    ports:
      - "8080:8080"
    environment:
      DB_SOURCE_URL: postgresql://postgres:postgres@postgres:5432/openpim
      VECTORIZER_API_URL: ${VECTORIZER_API_URL}
      VECTORIZER_MODEL: ${VECTORIZER_MODEL}
      LLM_API_URL: ${LLM_API_URL}
      LLM_MODEL: ${LLM_MODEL}
      DUPLICATE_DISTANCE_THRESHOLD: ${DUPLICATE_DISTANCE_THRESHOLD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: snorlaxify-client
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
