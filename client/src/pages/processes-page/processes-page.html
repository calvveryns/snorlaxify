<div class="toolbar">
  <button pButton type="button" label="Создать процесс" icon="pi pi-plus" (click)="openCreateDialog()"></button>
    <p-button
    icon="pi pi-refresh"
    [outlined]="true"
    (onClick)="update$.next()"
  />
  <span class="spacer"></span>
</div>

<p-table [value]="rows()?.tasks || []" dataKey="date" [tableStyle]="{ 'min-width': '60rem' }" [loading]="loading()">
  <ng-template pTemplate="header">
    <tr>
      <th>Дата</th>
      <th>Название</th>
      <th>Найдено групп дубликатов</th>
      <th>Время обработки</th>
      <th>Статус</th>
      <th>Действия</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-row>
    <tr (click)="onRowClick(row.uuid)">
      <td>{{ row.started_at | date: 'dd.MM.yyyy HH:mm' }}</td>
      <td>{{ row.uuid }}</td>
      <td>{{ row?.recommendations?.results?.length }}</td>
      <td>{{ row.processingTime }}</td>
      <td>
        <p-tag [value]="row.status" [severity]="getSeverity(row.status)"></p-tag>
      </td>
      <td (click)="$event.stopPropagation()">
        <button
          pButton
          type="button"
          icon="pi pi-pencil"
          class="p-button-text p-button-sm"
          (click)="openEditDialog(row, $event)"
          pTooltip="Редактировать"
          tooltipPosition="top"
        ></button>
        <button
          pButton
          type="button"
          icon="pi pi-trash"
          class="p-button-text p-button-sm p-button-danger"
          (click)="deleteProcess(row.uuid, $event)"
          pTooltip="Удалить"
          tooltipPosition="top"
        ></button>
      </td>
    </tr>
  </ng-template>
</p-table>

<app-create-process-dialog (create)="onSaveProcess($event)"></app-create-process-dialog>

<p-confirmDialog></p-confirmDialog>
