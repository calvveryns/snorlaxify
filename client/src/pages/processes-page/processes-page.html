<div class="toolbar">
  <button pButton type="button" label="Создать процесс" icon="pi pi-plus" (click)="openCreateDialog()"></button>
  <span class="spacer"></span>
</div>

<p-table [value]="rows()" dataKey="date" [tableStyle]="{ 'min-width': '60rem' }">
  <ng-template pTemplate="header">
    <tr>
      <th>Дата</th>
      <th>Название</th>
      <th>Найдено групп дубликатов</th>
      <th>Время обработки</th>
      <th>Статус</th>
      <th>Действия</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-row>
    <tr (click)="onRowClick(row)">
      <td>{{ row.date | date: 'dd.MM.yyyy HH:mm' }}</td>
      <td>{{ row.databaseName }}</td>
      <td>{{ row.duplicatesFound }}</td>
      <td>{{ row.processingTime }}</td>
      <td>
        <p-tag [value]="row.status" [severity]="getSeverity(row.status)"></p-tag>
      </td>
      <td (click)="$event.stopPropagation()">
        <button
          pButton
          type="button"
          icon="pi pi-pencil"
          class="p-button-text p-button-sm"
          (click)="openEditDialog(row, $event)"
          pTooltip="Редактировать"
          tooltipPosition="top"
        ></button>
        <button
          pButton
          type="button"
          icon="pi pi-trash"
          class="p-button-text p-button-sm p-button-danger"
          (click)="deleteProcess(row, $event)"
          pTooltip="Удалить"
          tooltipPosition="top"
        ></button>
      </td>
    </tr>
  </ng-template>
</p-table>

<app-create-process-dialog (save)="onSaveProcess($event)"></app-create-process-dialog>

<p-confirmDialog></p-confirmDialog>
